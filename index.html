<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目可视化解读</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;text-align:center;margin-bottom:.5rem;letter-spacing:-0.02em}
h1 em{font-style:normal;color:#e85d26}
p.sub{text-align:center;color:#555;font-size:clamp(.9rem,1.5vw,1.1rem);margin-bottom:2.5rem;max-width:500px}
.cards{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center}
.card{background:#fff;border:1.5px solid #e5e2dc;border-radius:16px;padding:2rem;width:min(100%,340px);text-decoration:none;color:#1a1a1a;transition:all .3s cubic-bezier(.22,1,.36,1);box-shadow:0 2px 20px rgba(0,0,0,.06)}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.1);border-color:#e85d26}
.card .icon{font-size:2.5rem;margin-bottom:1rem}
.card h2{font-size:1.15rem;font-weight:700;margin-bottom:.4rem}
.card p{font-size:.85rem;color:#555;line-height:1.6}
.card .tag{display:inline-block;margin-top:.8rem;font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:6px}
.tag-pipe{background:#edfaf6;color:#10a37f}
.tag-skill{background:#eef2ff;color:#3b6df0}
@media(max-width:768px){
  body{padding:1.5rem 1rem}
  .cards{gap:1rem}
  .card{padding:1.5rem}
}
@media(max-width:400px){
  body{padding:1.2rem .75rem}
  .card{padding:1.2rem}
  .card .icon{font-size:2rem;margin-bottom:.75rem}
}
@media(hover:none){.card:hover{transform:none;box-shadow:0 2px 20px rgba(0,0,0,.06)}}
</style>
</head>
<body>
<h1>项目<em>可视化解读</em></h1>
<p class="sub">选一个项目，用交互式图解看懂它是怎么运转的。</p>
<div class="cards">
  <a class="card" href="./openclaw/">
    <div class="icon">&#x1f916;</div>
    <h2>OpenClaw</h2>
    <p>一个开源 AI 助手框架，同时帮你回复 WhatsApp、Telegram、Discord 等所有消息。</p>
    <span class="tag tag-pipe">AI 助手框架</span>
  </a>
  <a class="card" href="./youtube-to-ebook/">
    <div class="icon">&#x1f4fa;</div>
    <h2>YouTube to Ebook</h2>
    <p>一条自动化流水线，把 YouTube 视频变成精美电子书发到你邮箱。</p>
    <span class="tag tag-pipe">Python 流水线</span>
  </a>
  <a class="card" href="./frontend-slides/">
    <div class="icon">&#x1f3a8;</div>
    <h2>Frontend Slides</h2>
    <p>一个 AI 技能插件，用对话帮你做出零依赖的网页版 PPT。</p>
    <span class="tag tag-skill">Claude Code Skill</span>
  </a>
</div>
</body>
</html>
